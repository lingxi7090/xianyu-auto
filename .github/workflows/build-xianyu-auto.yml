name: Build XianyuAuto APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['projects/xianyu-auto/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          cd projects/xianyu-auto
          chmod +x gradlew
          ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xianyu-auto-debug
          path: projects/xianyu-auto/app/build/outputs/apk/debug/*.apk
