name: Build XianyuAuto APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
      
      - name: Build APK
        run: |
          cd projects/xianyu-auto 2>/dev/null || true
          gradle assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xianyu-auto-debug
          path: app/build/outputs/apk/debug/*.apk
